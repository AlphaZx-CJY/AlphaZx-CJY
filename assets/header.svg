<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ECDC4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="200" fill="url(#grad1)" rx="10"/>
  
  <!-- 装饰线条 -->
  <path d="M 0 100 Q 200 80 400 100 T 800 100" stroke="#58A6FF" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M 0 120 Q 200 100 400 120 T 800 120" stroke="#4ECDC4" stroke-width="2" fill="none" opacity="0.2"/>
  
  <!-- 地理坐标装饰 -->
  <text x="750" y="30" font-family="monospace" font-size="12" fill="#8B949E" text-anchor="end">
    N31°14' E121°29'
  </text>
  
  <!-- 主标题 -->
  <text x="400" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" 
        font-size="36" font-weight="bold" fill="url(#textGrad)" text-anchor="middle">
    AlphaZx-CJY
  </text>
  
  <!-- 副标题 -->
  <text x="400" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" 
        font-size="16" fill="#8B949E" text-anchor="middle">
    Software Engineer · AI Tools Developer
  </text>
  
  <!-- 技能标签 -->
  <g transform="translate(400, 165)">
    <rect x="-140" y="-10" width="60" height="20" rx="10" fill="#3178C6" opacity="0.8"/>
    <text x="-110" y="4" font-family="monospace" font-size="10" fill="white" text-anchor="middle">TypeScript</text>
    
    <rect x="-70" y="-10" width="50" height="20" rx="10" fill="#007396" opacity="0.8"/>
    <text x="-45" y="4" font-family="monospace" font-size="10" fill="white" text-anchor="middle">Java</text>
    
    <rect x="-10" y="-10" width="50" height="20" rx="10" fill="#3776AB" opacity="0.8"/>
    <text x="15" y="4" font-family="monospace" font-size="10" fill="white" text-anchor="middle">Python</text>
    
    <rect x="50" y="-10" width="40" height="20" rx="10" fill="#FF6B6B" opacity="0.8"/>
    <text x="70" y="4" font-family="monospace" font-size="10" fill="white" text-anchor="middle">AI/LLM</text>
    
    <rect x="100" y="-10" width="40" height="20" rx="10" fill="#4ECDC4" opacity="0.8"/>
    <text x="120" y="4" font-family="monospace" font-size="10" fill="white" text-anchor="middle">IDE</text>
  </g>
</svg>
